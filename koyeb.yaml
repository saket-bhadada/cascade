services:
  - name: cascade-backend
    git:
      repository: https://github.com/YOUR_USERNAME/cascade
      branch: main
    buildpack: node
    ports:
      - protocol: http
        port: 3001
    routes:
      - path: /
    env:
      - key: PORT
        value: "3001"
      - key: NODE_ENV
        value: production
      - key: HF_MODEL_URL
        scope: SERVICE
        value: https://YOUR_USERNAME-cascade-ai-engine.hf.space
    # Secrets can be added via Koyeb dashboard
    # or as SERVICE scope environment variables
